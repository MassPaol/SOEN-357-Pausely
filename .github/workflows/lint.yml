name: Lint and Fix
on: [push, pull_request]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # This ensures it looks at the lockfile in the subfolder
          cache-dependency-path: pausely/package-lock.json

      # 1. Install Root deps (Husky, lint-staged)
      - name: Install Root Dependencies
        run: npm install --ignore-scripts

      # 2. Install App deps (React, Expo, Navigation)
      - name: Install App Dependencies
        working-directory: ./pausely
        run: npm install

      # 3. Run Lint from the context of the subfolder
      - name: Run ESLint
        working-directory: ./pausely
        run: npx eslint . --fix

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix linting issues"