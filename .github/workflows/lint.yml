name: Lint and Fix
on: [push, pull_request]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # Fix 1: Skip the husky prepare script during install
      - run: npm install --ignore-scripts
      
      # Fix 2: Point to the correct folder/config
      - run: npx eslint pausely/ --fix --config pausely/eslint.config.js
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix linting issues"